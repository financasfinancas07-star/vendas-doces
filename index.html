<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão Cones & Trufas</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f4; margin: 0; padding: 10px; }
        .container { max-width: 100%; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d63384; font-size: 1.4em; margin-bottom: 10px; }

        .filtro-mes { margin-bottom: 15px; text-align: center; }
        #filtroData { width: 60%; height: 35px; border-radius: 8px; border: 1px solid #ddd; padding: 5px; }

        .resumo { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .card { padding: 10px; border-radius: 10px; text-align: center; color: white; font-size: 0.85em; }
        .ganhos { background: #28a745; }
        .pendente { background: #ffc107; color: #333; }
        .gastos { background: #dc3545; }
        .lucro { background: #007bff; }
        .contagem { background: #6f42c1; grid-column: span 2; display: flex; justify-content: space-around; }
        .valor { display: block; font-weight: bold; font-size: 1.1em; }

        /* Melhoria: Botão de Backup */
        .btn-backup { 
            width: 100%; background: #6c757d; color: white; border: none; 
            border-radius: 8px; padding: 8px; font-size: 0.8em; 
            margin-bottom: 15px; cursor: pointer; font-weight: bold;
        }

        .secao { background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #eee; }
        h3 { margin: 0 0 10px 0; font-size: 1em; color: #666; }

        .row { display: flex; gap: 10px; }
        input, select, button { width: 100%; height: 45px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { border: none; font-weight: bold; color: white; cursor: pointer; }
        .btn-venda { background: #28a745; margin-top: 10px; }
        .btn-gasto { background: #dc3545; }

        .item-card { background: white; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .item-card:active { background: #f0f0f0; }
        .desc { font-weight: bold; font-size: 1em; display: block; }
        .tipo-badge { font-size: 0.7em; background: #eee; padding: 2px 6px; border-radius: 10px; color: #555; }
        .data-valor { font-size: 0.85em; color: #777; }
        .status { font-size: 0.75em; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .pago { background: #e2f9e1; color: #1e7e34; }
        .devendo { background: #fff3cd; color: #856404; }
        .btn-confirmar { width: auto; height: auto; padding: 6px 12px; background: #ffc107; color: #333; margin-left: 5px; font-size: 0.75em; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍬 Gestão de Vendas</h2>

    <div class="filtro-mes">
        <input type="month" id="filtroData" onchange="atualizarTela()">
    </div>

    <div class="resumo">
        <div class="card ganhos">Recebido<span id="resumoGanhos" class="valor">R$ 0</span></div>
        <div class="card pendente">A Receber<span id="resumoPendente" class="valor">R$ 0</span></div>
        <div class="card gastos">Gastos<span id="resumoGastos" class="valor">R$ 0</span></div>
        <div class="card lucro">Saldo Líquido<span id="resumoLucro" class="valor">R$ 0</span></div>
        <div class="card contagem">
            <span>Cones: <b id="qtdCones">0</b></span>
            <span>Trufas: <b id="qtdTrufas">0</b></span>
        </div>
    </div>

    <button class="btn-backup" onclick="exportarDados()">📥 Salvar Cópia de Segurança (Backup)</button>

    <div class="secao">
        <h3>Nova Venda</h3>
        <input type="text" id="vendaCliente" placeholder="Nome do Cliente">
        <div class="row">
            <select id="vendaTipo">
                <option value="Cone">Cone</option>
                <option value="Trufa">Trufa</option>
            </select>
            <input type="number" id="vendaQtd" placeholder="Quantidade">
        </div>
        <input type="number" step="0.01" id="vendaValorUnit" placeholder="Preço Unitário (R$)">
        <div style="font-size: 0.9em; margin: 5px 0; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="vendaPago" checked style="width: 20px; height: 20px;"> Dinheiro recebido?
        </div>
        <button class="btn-venda" onclick="adicionar('venda')">Registrar Venda</button>
    </div>

    <div class="secao">
        <h3>Novo Gasto</h3>
        <input type="text" id="gastoDesc" placeholder="Descrição do gasto">
        <input type="number" step="0.01" id="gastoValor" placeholder="Valor total gasto (R$)">
        <button class="btn-gasto" onclick="adicionar('gasto')">Registrar Gasto</button>
    </div>

    <div id="listaItens"></div>
</div>

<script>
    let registros = JSON.parse(localStorage.getItem('db_trufas_v6')) || [];
    document.getElementById('filtroData').value = new Date().toISOString().substring(0, 7);

    function adicionar(tipo) {
        const mes = document.getElementById('filtroData').value;
        let novoItem = { id: Date.now(), mes, tipo, dia: new Date().toLocaleDateString('pt-BR') };

        if (tipo === 'venda') {
            const desc = document.getElementById('vendaCliente').value;
            const qtd = parseInt(document.getElementById('vendaQtd').value);
            const valorUnit = parseFloat(document.getElementById('vendaValorUnit').value);
            if (!desc || isNaN(qtd) || isNaN(valorUnit)) return alert("Preencha os dados da venda!");
            
            novoItem.desc = desc;
            novoItem.categoria = document.getElementById('vendaTipo').value;
            novoItem.qtd = qtd;
            novoItem.valor = valorUnit * qtd; 
            novoItem.pago = document.getElementById('vendaPago').checked;
        } else {
            const desc = document.getElementById('gastoDesc').value;
            const valor = parseFloat(document.getElementById('gastoValor').value);
            if (!desc || isNaN(valor)) return alert("Preencha os dados do gasto!");
            
            novoItem.desc = desc;
            novoItem.categoria = 'Insumo';
            novoItem.valor = valor;
            novoItem.pago = true;
            novoItem.qtd = 0;
        }

        registros.push(novoItem);
        salvarEAtualizar();
        limparCampos();
    }

    function salvarEAtualizar() {
        localStorage.setItem('db_trufas_v6', JSON.stringify(registros));
        atualizarTela();
    }

    function limparCampos() {
        document.getElementById('vendaCliente').value = "";
        document.getElementById('vendaValorUnit').value = "";
        document.getElementById('vendaQtd').value = "";
        document.getElementById('gastoDesc').value = "";
        document.getElementById('gastoValor').value = "";
    }

    function pagar(id) {
        const i = registros.findIndex(r => r.id === id);
        registros[i].pago = true;
        salvarEAtualizar();
    }

    function deletar(id) {
        if(confirm("Deseja realmente excluir este registro?")) {
            registros = registros.filter(r => r.id !== id);
            salvarEAtualizar();
        }
    }

    // Melhoria: Exportação de segurança
    function exportarDados() {
        if(registros.length === 0) return alert("Não há dados para exportar.");
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(registros));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "backup_trufas_" + document.getElementById('filtroData').value + ".json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function atualizarTela() {
        const filtro = document.getElementById('filtroData').value;
        const lista = document.getElementById('listaItens');
        lista.innerHTML = "";
        
        let r_ganho = 0, r_pen = 0, r_gas = 0;
        let c_cones = 0, c_trufas = 0;

        registros.filter(r => r.mes === filtro).reverse().forEach(r => {
            if(r.tipo === 'venda') { 
                if(r.pago) r_ganho += r.valor; else r_pen += r.valor;
                if(r.categoria === 'Cone') c_cones += r.qtd;
                if(r.categoria === 'Trufa') c_trufas += r.qtd;
            } else { 
                r_gas += r.valor; 
            }

            const statusBadge = r.tipo === 'venda' ? 
                `<span class="status ${r.pago ? 'pago' : 'devendo'}">${r.pago ? 'PAGO' : 'PENDENTE'}</span>` : '';
            
            const btnPagar = (r.tipo === 'venda' && !r.pago) ? 
                `<button class="btn-confirmar" onclick="pagar(${r.id})">Confirmar Pagamento</button>` : '';

            const infoQtd = r.tipo === 'venda' ? `(${r.qtd} un) ` : '';

            lista.innerHTML += `
                <div class="item-card">
                    <div style="flex-grow:1">
                        <span class="desc">${r.desc} <span class="tipo-badge">${r.categoria}</span></span>
                        <span class="data-valor">${r.dia} - ${infoQtd}R$ ${r.valor.toFixed(2)}</span>
                        ${statusBadge}
                    </div>
                    <div>
                        ${btnPagar}
                        <span onclick="deletar(${r.id})" style="margin-left:15px; font-size: 1.2em; cursor:pointer;">🗑️</span>
                    </div>
                </div>`;
        });

        document.getElementById("resumoGanhos").innerText = `R$ ${r_ganho.toFixed(2)}`;
        document.getElementById("resumoPendente").innerText = `R$ ${r_pen.toFixed(2)}`;
        document.getElementById("resumoGastos").innerText = `R$ ${r_gas.toFixed(2)}`;
        
        // Exibe o lucro real (dinheiro no bolso) vs previsto
        const lucroReal = r_ganho - r_gas;
        document.getElementById("resumoLucro").innerText = `R$ ${lucroReal.toFixed(2)}`;
        
        document.getElementById("qtdCones").innerText = c_cones;
        document.getElementById("qtdTrufas").innerText = c_trufas;
    }
    atualizarTela();
</script>

</body>
</html>
